name: eflotte

services:
  web:
    build: .
    command: >
      sh -c "python prestart.py &&
      gunicorn app.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8050
      --workers 1
      --timeout 300
      --graceful-timeout 30
      --keep-alive 5
      --access-logfile -
      --log-level info"
    volumes:
      - .:/app
    ports:
      - "8050:8050"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
