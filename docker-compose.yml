name: eflotte

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: eflotte
      POSTGRES_USER: flotte_user
      POSTGRES_PASSWORD: FlottePass2025
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flotte_user -d eflotte"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: >
      sh -c "python prestart.py &&
      gunicorn app.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8050
      --workers 1
      --timeout 300
      --graceful-timeout 30
      --keep-alive 5
      --access-logfile -
      --log-level info"
    volumes:
      - .:/app
    ports:
      - "8050:8050"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
